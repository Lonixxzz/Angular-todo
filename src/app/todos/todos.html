<h1>TODO</h1>

@if (!todoItems().length) {
  <p>Loading....</p>
}
<form action="">
  <label>Filter Todos : </label>
  <input type="text" placeholder="search.." [(ngModel)]="searchTerm" name="searchTerm" />
</form>

<ul>
  @for (todo of todoItems() | filterTodos: searchTerm(); track todo.id) {
    <app-todo-item (checked)="updateTodoItem($event)" [todo]="todo" />
  }
</ul>
